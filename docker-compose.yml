services:

  # ---------- Infrastructure ----------

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20

  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: CryptoCluster
      CASSANDRA_DC: dc1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 200M
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 30

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./ddl/cassandra:/ddl:ro
    entrypoint: ["bash", "-c"]
    command: ["cqlsh cassandra -f /ddl/init.cql && echo 'cassandra schema applied'"]
    restart: "no"

  # ---------- Person 1 services ----------

  ingestion:
    build: ./ingestion
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SYMBOLS: ${SYMBOLS:-XBTUSD,ETHUSD}
      BITMEX_WS_URL: ${BITMEX_WS_URL:-wss://www.bitmex.com/realtime}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped

  whale-alert:
    build: ./streaming
    command: ["python", "-u", "whale_alert.py"]
    depends_on:
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CASSANDRA_HOSTS: cassandra
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped

  volatility-monitor:
    build: ./streaming
    command: ["python", "-u", "volatility_monitor.py"]
    depends_on:
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CASSANDRA_HOSTS: cassandra
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped

  market-momentum:
    build: ./streaming
    command: ["python", "-u", "market_momentum.py"]
    depends_on:
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CASSANDRA_HOSTS: cassandra
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped

  trades-sink:
    build: ./streaming
    command: ["python", "-u", "trades_sink.py"]
    depends_on:
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CASSANDRA_HOSTS: cassandra
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
    environment:
      CASSANDRA_HOSTS: cassandra
    restart: unless-stopped

volumes:
  cassandra-data:
